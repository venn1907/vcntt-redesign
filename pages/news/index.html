<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tin tức - Viện Công nghệ số</title>

    <link rel="icon" type="image/png" href="../../assets/img/icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,0,0"
    />

    <link rel="stylesheet" href="../../assets/css/material-kit.min.css" />
    <link rel="stylesheet" href="../../css/base.css" />
    <link rel="stylesheet" href="../../css/news.css" />
  </head>

  <body data-page="news">
    <header id="site-header"></header>

    <main id="main-content" class="vc-news-main">
      <section class="vc-news-intro-strip">
        <div class="container">
          <div class="vc-news-intro-panel">
            <nav aria-label="Breadcrumb" class="vc-news-breadcrumb">
              <ol class="breadcrumb mb-0">
                <li class="breadcrumb-item">
                  <a href="../../index.html">Trang chủ</a>
                </li>
                <li class="breadcrumb-item active" aria-current="page">
                  Tin tức
                </li>
              </ol>
            </nav>

            <div class="vc-news-head">
              <div>
                <p class="vc-news-kicker mb-2">Cổng thông tin học thuật</p>
                <h1 class="vc-news-title mb-2">Tin tức và thông báo</h1>
                <p class="vc-news-subtitle mb-0">
                  Tìm kiếm nhanh các bài viết, thông báo học vụ và hoạt động mới
                  nhất.
                </p>
              </div>
              <p class="vc-news-count mb-0">
                <span id="resultCount">0 kết quả</span>
              </p>
            </div>

            <div class="vc-news-filters">
              <div class="vc-filter-item">
                <label class="form-label mb-1" for="categoryFilter"
                  >Danh mục</label
                >
                <select
                  id="categoryFilter"
                  class="form-select"
                  aria-label="Lọc theo danh mục"
                ></select>
              </div>

              <div class="vc-filter-item vc-filter-item--search">
                <label class="form-label mb-1" for="searchInput"
                  >Tìm kiếm</label
                >
                <div class="input-group input-group-outline">
                  <span class="input-group-text">
                    <span
                      class="material-symbols-rounded opacity-6"
                      aria-hidden="true"
                      >search</span
                    >
                  </span>
                  <input
                    id="searchInput"
                    type="text"
                    class="form-control"
                    placeholder="Nhập tiêu đề hoặc nội dung tóm tắt..."
                    aria-label="Tìm kiếm bài viết"
                  />
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="vc-news-section">
        <div class="container">
          <section class="vc-news-list-panel" aria-labelledby="news-list-title">
            <div class="vc-news-section-head">
              <h2 id="news-list-title" class="vc-news-section-title">
                Danh sách bài viết
              </h2>
            </div>
            <div class="row g-4" id="news-grid" aria-live="polite"></div>
            <div class="vc-news-pagination-wrap" id="pagination"></div>
          </section>
        </div>
      </section>
    </main>

    <footer id="site-footer"></footer>

    <script src="../../assets/js/core/bootstrap.bundle.min.js"></script>
    <script src="../../assets/js/material-kit.min.js"></script>
    <script src="../../assets/js/plugins/choices.min.js"></script>
    <script type="module" src="../../js/main.js"></script>
  </body>
</html>
